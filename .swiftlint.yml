included:
  - Geografy

excluded:
  - Geografy/Resource

disabled_rules:
  - todo
  - nesting
  - large_tuple
  - inclusive_language
  - implicit_optional_initialization
  - for_where

opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - first_where

line_length:
  warning: 120
  error: 320
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 650
  error: 800

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 60
  error: 100

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - db
    - xp
    - cx
    - cy
    - n
    - j
    - a
    - x
    - y
    - g
    - b
    - r
    - i
    - p

trailing_comma:
  mandatory_comma: true

vertical_whitespace:
  max_empty_lines: 1

cyclomatic_complexity:
  warning: 15
  error: 25
